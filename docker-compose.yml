version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: forex_postgres
    environment:
      POSTGRES_DB: forex_trading_db
      POSTGRES_USER: forex_user
      POSTGRES_PASSWORD: forex_password123
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - forex_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forex_user -d forex_trading_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for Celery and Caching
  redis:
    image: redis:7-alpine
    container_name: forex_redis
    command: redis-server --appendonly yes --requirepass redis_password123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - forex_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Django Backend API
  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: forex_backend
    command: >
      sh -c "
        python manage.py collectstatic --noinput &&
        python manage.py migrate &&
        python manage.py loaddata initial_data.json &&
        gunicorn defang_sample.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
      "
    volumes:
      - ./app:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://forex_user:forex_password123@postgres:5432/forex_trading_db
      - REDIS_URL=redis://:redis_password123@redis:6379/0
      - CELERY_BROKER_URL=redis://:redis_password123@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:redis_password123@redis:6379/0
      - SECRET_KEY=django-insecure-forex-trading-bot-secret-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,backend,forex-bot.local
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - TRADERMADE_API_KEY=${TRADERMADE_API_KEY:-}
      - TWELVE_DATA_API_KEY=${TWELVE_DATA_API_KEY:-}
      - OANDA_API_KEY=${OANDA_API_KEY:-}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID:-}
      - OANDA_ENVIRONMENT=${OANDA_ENVIRONMENT:-practice}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - forex_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker for Background Tasks
  celery_worker:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: forex_celery_worker
    command: celery -A defang_sample worker --loglevel=info --concurrency=4
    volumes:
      - ./app:/app
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://forex_user:forex_password123@postgres:5432/forex_trading_db
      - REDIS_URL=redis://:redis_password123@redis:6379/0
      - CELERY_BROKER_URL=redis://:redis_password123@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:redis_password123@redis:6379/0
      - SECRET_KEY=django-insecure-forex-trading-bot-secret-key-change-in-production
      - TRADERMADE_API_KEY=${TRADERMADE_API_KEY:-}
      - TWELVE_DATA_API_KEY=${TWELVE_DATA_API_KEY:-}
      - OANDA_API_KEY=${OANDA_API_KEY:-}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID:-}
      - OANDA_ENVIRONMENT=${OANDA_ENVIRONMENT:-practice}
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - forex_network
    restart: unless-stopped

  # Celery Beat for Scheduled Tasks
  celery_beat:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: forex_celery_beat
    command: celery -A defang_sample beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./app:/app
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://forex_user:forex_password123@postgres:5432/forex_trading_db
      - REDIS_URL=redis://:redis_password123@redis:6379/0
      - CELERY_BROKER_URL=redis://:redis_password123@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:redis_password123@redis:6379/0
      - SECRET_KEY=django-insecure-forex-trading-bot-secret-key-change-in-production
      - TRADERMADE_API_KEY=${TRADERMADE_API_KEY:-}
      - TWELVE_DATA_API_KEY=${TWELVE_DATA_API_KEY:-}
      - OANDA_API_KEY=${OANDA_API_KEY:-}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID:-}
      - OANDA_ENVIRONMENT=${OANDA_ENVIRONMENT:-practice}
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - forex_network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forex_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
      - REACT_APP_WS_URL=ws://localhost:8000/ws
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - forex_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: forex_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/var/www/static
      - media_volume:/var/www/media
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - forex_network
    restart: unless-stopped

  # Monitoring with Flower (Celery monitoring)
  flower:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: forex_flower
    command: celery -A defang_sample flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://:redis_password123@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:redis_password123@redis:6379/0
    depends_on:
      - redis
      - celery_worker
    networks:
      - forex_network
    restart: unless-stopped

  # MailHog for Email Testing (Development)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: forex_mailhog
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - forex_network
    restart: unless-stopped

  # Prometheus for Metrics (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: forex_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - forex_network
    restart: unless-stopped

  # Grafana for Visualization (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: forex_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - forex_network
    restart: unless-stopped

networks:
  forex_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local